name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ─── Run tests on all Node versions ───────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --coverage

  # ─── Publish to npm ───────────────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Create GitHub Release ────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: await getPreviousTag(),
              head: context.ref.replace('refs/tags/', ''),
            });

            async function getPreviousTag() {
              try {
                const { data: tags } = await github.rest.repos.listTags({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 2,
                });
                return tags.length > 1 ? tags[1].name : tags[0]?.name || 'HEAD~1';
              } catch {
                return 'HEAD~1';
              }
            }

            const notes = commits.commits
              .map(c => `- ${c.commit.message.split('\n')[0]} (@${c.author?.login || c.commit.author?.name})`)
              .join('\n');

            core.setOutput('notes', notes || 'No changes documented.');

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Changes

            ${{ steps.release-notes.outputs.notes }}

            ---
            Install: `npm install -g appshield@${{ github.ref_name }}`
            Docker: `docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
          draft: false
          prerelease: false
          generate_release_notes: true
